<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Panel Administrativo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="text-info fw-bold">🔱 Panel de Control Global (Admin)</h1>
        <a href="/logout" class="btn btn-outline-danger">Cerrar Sesión</a>
    </div>

    <div class="card bg-secondary text-white p-4 border-0 shadow">
        <h3 class="mb-4 text-warning">🕵️‍♂️ Auditoría de Capturas Globales</h3>

        <table class="table table-dark table-striped align-middle">
            <thead>
            <tr>
                <th>Pescador (Propietario)</th>
                <th>Especie</th>
                <th>Peso</th>
                <th>Tamaño</th>
                <th>Ubicación</th>
                <th>Fecha</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="c : ${capturas}">
                <td class="text-info fw-bold" th:text="${c.usuario != null ? c.usuario.nombre : 'Sin asignar'}"></td>
                <td th:text="${c.especie}"></td>
                <td th:text="${c.peso + ' kg'}"></td>
                <td th:text="${c.tamano + ' cm'}"></td>
                <td th:text="${c.ubicacion}"></td>
                <td th:text="${c.fecha}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
