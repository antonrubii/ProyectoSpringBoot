<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Capturas</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#f4f6f9;
            margin:0;
            padding:30px;
        }

        h1{
            text-align:center;
            color:#1e3a5f;
        }

        .contenedor{
            width:90%;
            margin:auto;
        }

        table{
            width:100%;
            border-collapse: collapse;
            background:white;
            border-radius:15px;
            overflow:hidden;
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
        }

        th{
            background:#2b6cb0;
            color:white;
            padding:15px;
        }

        td{
            padding:15px;
            text-align:center;
            border-bottom:1px solid #ddd;
        }

        tr:hover{
            background:#f1f5f9;
            transition:0.3s;
        }

        .peso{
            color:green;
            font-weight:bold;
        }

    </style>

</head>

<body>

<h1>🎣 Registro de Capturas</h1>

<div class="contenedor">

    <table>

        <thead>
        <tr>
            <th>Especie</th>
            <th>Fecha</th>
            <th>Peso</th>
            <th>Tamaño</th>
            <th>Ubicación</th>
            <th>Pescador</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="c : ${capturas}">

            <td th:text="${c.especie}"></td>

            <td th:text="${c.fecha}"></td>

            <td class="peso"
                th:text="${c.peso+' kg'}"></td>

            <td th:text="${c.tamano+' cm'}"></td>

            <td th:text="${c.ubicacion}"></td>

            <td th:text="${c.usuario.nombre}"></td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
