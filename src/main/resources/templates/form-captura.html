<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nueva Captura</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width: 550px;">
    <div class="card p-4 shadow-sm border-0" style="border-radius: 15px;">
        <h3 class="text-center text-primary fw-bold mb-4">🐟 Registrar Pieza</h3>

        <form th:action="@{/capturas/guardar}" th:object="${captura}" method="post">
            <div class="mb-3">
                <label class="form-label fw-bold text-muted">Especie</label>
                <input type="text" class="form-control" th:field="*{especie}" placeholder="Ej: Atún, Rodaballo..." required>
            </div>
            <div class="row mb-3">
                <div class="col">
                    <label class="form-label fw-bold text-muted">Peso (kg)</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{peso}" required>
                </div>
                <div class="col">
                    <label class="form-label fw-bold text-muted">Tamaño (cm)</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{tamano}" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold text-muted">Ubicación / Caladero</label>
                <input type="text" class="form-control" th:field="*{ubicacion}" placeholder="Coordenadas o zona marítima">
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold text-muted">Fecha del Lance</label>
                <input type="date" class="form-control" th:field="*{fecha}" required>
            </div>

            <div class="d-flex justify-content-between">
                <a href="/perfil" class="btn btn-outline-secondary px-4 rounded-pill">Volver</a>
                <button type="submit" class="btn btn-primary px-4 rounded-pill">Guardar en Bitácora</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
