<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>PescaApp - Tu Diario de Pesca Sostenible</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(rgba(15, 32, 39, 0.85), rgba(44, 83, 100, 0.85)),
            url('https://images.unsplash.com/photo-1544551763-46a013bb70d5?q=80&w=1920') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
        }
        .hero-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .card-menu {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
        }
        .btn-custom {
            border-radius: 50px;
            font-weight: bold;
            padding: 12px 30px;
            transition: 0.3s;
        }
        .btn-custom:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,210,252,0.4);
        }
    </style>
</head>
<body>

<div class="hero-section">
    <div class="card-menu">
        <div class="display-1 mb-2">🎣</div>
        <h1 class="fw-bold mb-3" style="color: #00d2fc;">PescaApp</h1>
        <p class="lead mb-4 text-light-50">Gestiona tus lances de pesca, respeta las tallas mínimas y mantén al día tu bitácora marina profesional.</p>

        <hr class="bg-light my-4" style="opacity: 0.3;">

        <div class="d-grid gap-3 col-10 mx-auto">
            <a href="/capturas" class="btn btn-outline-light btn-custom btn-lg">
                🌊 Ver Tablón Común (Lectura)
            </a>

            <div class="row g-2 mt-2">
                <div class="col-6">
                    <a href="/login" class="btn btn-primary btn-custom w-100 py-3">
                        🔑 Iniciar Sesión
                    </a>
                </div>
                <div class="col-6">
                    <a href="/registro" class="btn btn-success btn-custom w-100 py-3">
                        ⚓ Registrarse
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
