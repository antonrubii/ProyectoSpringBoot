<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mi Perfil de Pescador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; }
        .navbar-marina { background: linear-gradient(to right, #203a43, #2c5364); }
        .card-usuario { border-radius: 15px; border-top: 5px solid #3a7bd5; }
        .table-pesca thead { background-color: #2c5364; color: white; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-marina shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">⚓ Cuaderno de Bitácora</a>
        <div class="d-flex">
            <a href="/logout" class="btn btn-sm btn-outline-light rounded-pill">Dejar Puerto (Salir)</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row">

        <div class="col-md-4 mb-4">
            <div class="card card-usuario shadow p-4 text-center">
                <div class="fs-1 text-primary mb-2">🧑‍✈️</div>
                <h3 class="fw-bold text-dark mb-1" th:text="${usuario.nombre}">Nombre</h3>
                <p class="text-muted mb-3" th:text="${usuario.email}">email@correo.com</p>
                <div class="badge bg-info p-2 mb-4">Rol: Pescador Activo</div>

                <a href="/capturas/nuevo" class="btn btn-success w-100 rounded-pill py-2 shadow-sm fw-bold">
                    🎣 Registrar Nueva Captura
                </a>
                <a href="/capturas" class="btn btn-outline-secondary w-100 rounded-pill py-2 mt-2">
                    🌊 Ver Tablón Común
                </a>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow p-4 border-0" style="border-radius: 15px;">
                <h4 class="fw-bold text-secondary mb-4">🐋 Mis Capturas Registradas</h4>

                <div th:if="${#lists.isEmpty(misCapturas)}" class="alert alert-warning text-center">
                    Aún no has registrado lances en tu historial. ¡Prepara las cañas!
                </div>

                <table th:if="${not #lists.isEmpty(misCapturas)}" class="table table-hover table-pesca align-middle">
                    <thead>
                    <tr>
                        <th>Especie</th>
                        <th>Peso</th>
                        <th>Tamaño</th>
                        <th>Fecha</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="c : ${misCapturas}">
                        <td class="fw-bold text-primary" th:text="${c.especie}"></td>
                        <td th:text="${c.peso != null ? c.peso + ' kg' : '-'}"></td>
                        <td th:text="${c.tamano != null ? c.tamano + ' cm' : '-'}"></td>
                        <td th:text="${c.fecha}"></td>
                        <td class="text-center">
                            <a th:href="@{/capturas/eliminar/{id}(id=${c.id})}"
                               class="btn btn-sm btn-danger rounded-pill px-3"
                               onclick="return confirm('¿Deseas borrar esta captura de tu registro personal?')">
                                Borrar
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

</body>
</html>
