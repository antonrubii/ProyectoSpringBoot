<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro de Pescadores - PescaApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1f4068, #162447, #1a1a2e);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
        }
        .register-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
            border: 2px solid #00d2fc;
        }
        .btn-marino {
            background: #0f4c81;
            color: white;
            font-weight: bold;
            border-radius: 50px;
        }
        .btn-marino:hover {
            background: #113f67;
            color: white;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="card register-card col-md-5 p-4">
        <h3 class="text-center fw-bold text-dark mb-2">⚓ Alistarse como Pescador</h3>
        <p class="text-center text-muted small mb-4">Crea tu cuenta para acceder a tu cuaderno de bitácora privado</p>

        <form th:action="@{/registro}" th:object="${usuario}" method="post">
            <div class="mb-3">
                <label class="form-label fw-bold text-secondary">Nombre Completo</label>
                <input type="text" class="form-control" th:field="*{nombre}" placeholder="Ej: Antón Rodríguez" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold text-secondary">Correo Electrónico</label>
                <input type="email" class="form-control" th:field="*{email}" placeholder="nombre@puerto.com" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold text-secondary">Contraseña de Acceso</label>
                <input type="password" class="form-control" th:field="*{password}" placeholder="Mínimo 4 caracteres" required>
            </div>

            <button type="submit" class="btn btn-marino w-100 py-2.5 shadow-sm">🚢 Registrarse y Alistarse</button>
        </form>

        <div class="text-center mt-3">
            <a href="/login" class="text-decoration-none small text-muted">¿Ya tienes cuenta? Inicia sesión aquí</a>
        </div>
    </div>
</div>

</body>
</html>
